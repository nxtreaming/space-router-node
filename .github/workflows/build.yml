name: Build Home Node

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: space-router-node-macos-arm64
          - os: macos-15-large
            artifact: space-router-node-macos-x64
          - os: windows-latest
            artifact: space-router-node-windows-x64
          - os: ubuntu-latest
            artifact: space-router-node-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller homenode.spec
        env:
          SR_BUILD_VERSION: ${{ steps.version.outputs.version }}

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/space-router-node.exe "dist/${{ matrix.artifact }}.exe"
          else
            mv dist/space-router-node "dist/${{ matrix.artifact }}"
          fi

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            timeout 5 "dist/${{ matrix.artifact }}.exe" || true
          else
            timeout 5 "dist/${{ matrix.artifact }}" || true
          fi
        env:
          SR_COORDINATION_API_URL: http://localhost:9999
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"

      # ---- macOS code signing & notarization (skipped if secrets not set) ----
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: Gluwa ($APPLE_TEAM_ID)" \
            --timestamp \
            "dist/${{ matrix.artifact }}"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          # Create a zip for notarization (notarytool requires zip/dmg/pkg)
          ditto -c -k --keepParent "dist/${{ matrix.artifact }}" "$RUNNER_TEMP/notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket
          xcrun stapler staple "dist/${{ matrix.artifact }}"

      - name: Clean up macOS keychain
        if: always() && runner.os == 'macOS' && env.KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ---- Windows code signing (skipped if secrets not set) ----
      - name: Sign Windows binary
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_PFX != ''
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          # Decode PFX from secret
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX)
          $pfxPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" `
            -Recurse -Filter "signtool.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          # Sign the binary
          & $signtool.FullName sign /f $pfxPath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "dist\${{ matrix.artifact }}.exe"

          # Clean up
          Remove-Item $pfxPath -Force

      # Build Linux packages (.deb and .rpm) via nfpm
      - name: Build Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Install nfpm via go install
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"

          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for package version
          PKG_VERSION="${VERSION#v}"

          # Build .deb
          VERSION="${PKG_VERSION}" nfpm package --packager deb --target "dist/${{ matrix.artifact }}.deb"

          # Build .rpm
          VERSION="${PKG_VERSION}" nfpm package --packager rpm --target "dist/${{ matrix.artifact }}.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.exe
            dist/${{ matrix.artifact }}.deb
            dist/${{ matrix.artifact }}.rpm

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Router Home Node ${{ github.ref_name }}"
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
